# SyncForge Windows Configuration
server.port=8081
server.forwarded-headers-strategy=framework

# Database Configuration (Point to Local Portable Postgres)
spring.datasource.url=jdbc:postgresql://localhost:5432/mft_db
spring.datasource.username=mft_user
spring.datasource.password=hello5
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway Settings
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Storage Path (Windows relative)
mft.storage.path=storage

# Performance Tuning
server.tomcat.threads.max=200
spring.datasource.hikari.maximum-pool-size=20

# Multi-part limits
spring.servlet.multipart.max-file-size=5GB
spring.servlet.multipart.max-request-size=5GB
