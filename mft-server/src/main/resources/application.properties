spring.datasource.url=jdbc:postgresql://localhost:5432/mft_db
spring.datasource.username=mft_user
spring.datasource.password=mft_password
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway Migration Configuration (Critical for In-Place Upgrades)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

# File Upload Settings
spring.servlet.multipart.max-file-size=5GB
spring.servlet.multipart.max-request-size=5GB
spring.servlet.multipart.enabled=true

# Storage Path (where encrypted chunks will be stored)
mft.storage.path=storage

# Reverse Proxy Configuration
# This tells Tomcat to trust the X-Forwarded-* headers sent by Nginx
server.forwarded-headers-strategy=framework

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.mft.server=DEBUG
