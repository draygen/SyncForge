events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # MFT Requirements: Increase client body size to allow large chunk uploads.
    # Without this, Nginx will block the upload with a '413 Request Entity Too Large' error.
    client_max_body_size 5G;

    # UPSTREAM BLOCK: This handles Load Balancing.
    # To expand to an HA cluster, simply add more server nodes here:
    #   server server1:8080;
    #   server server2:8080;
    upstream mft_backend {
        server server:8080;
    }

    server {
        listen 80;
        server_name localhost;

        # Route all API traffic to the Tomcat backend
        location /api/ {
            proxy_pass http://mft_backend;
            
            # Pass original request metadata to the backend
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header  Authorization;
            
            # CRITICAL MFT SETTING: Disable request buffering.
            # This streams the uploaded chunks directly to Tomcat without Nginx 
            # buffering them to disk first, significantly reducing latency and I/O overhead.
            proxy_request_buffering off;
        }

        # Future placeholder for serving a static HTML/JS dashboard
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
        }
    }
}
