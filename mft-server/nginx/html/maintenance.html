<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncForge | System Maintenance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
            color: #f8fafc; font-family: 'Inter', sans-serif; 
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
        }
        .maintenance-card {
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            padding: 50px; text-align: center; max-width: 500px; width: 100%;
        }
        .admin-face {
            width: 150px; height: 150px; border-radius: 50%;
            border: 4px solid #6366f1; box-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
            margin-bottom: 25px; object-fit: cover;
        }
    </style>
</head>
<body>

<div class="maintenance-card">
    <img src="/face.jpg" alt="Admin" class="admin-face" onerror="this.src='https://ui-avatars.com/api/?name=Admin&background=6366f1&color=fff&size=150'">
    <h2 class="fw-bold text-white mb-3">System Under Maintenance</h2>
    <p class="text-muted mb-4">I am currently applying updates to the SyncForge core. Please hold, the system will be back online shortly.</p>
    <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
    </div>
</div>

<script>
    // Automatically poll to see if maintenance is over, then redirect back
    setInterval(() => {
        let authHeader = sessionStorage.getItem('mft_auth');
        fetch('/api/system/ping', { headers: { 'Authorization': authHeader } })
            .then(res => res.json())
            .then(data => {
                if (data && data.maintenance === false) {
                    window.location.href = '/';
                }
            }).catch(e => console.log("Waiting for server..."));
    }, 5000);
</script>

</body>
</html>
